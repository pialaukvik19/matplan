<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pias Matplan</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #F5F0E8;
    --ink: #1A1612;
    --muted: #8A7F74;
    --accent: #C4622D;
    --accent-light: #F0D5C8;
    --green: #4A7C59;
    --green-light: #D4E8DA;
    --gold: #C49A2D;
    --gold-light: #F5EAC8;
    --border: #E5DDD4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--ink);
    color: var(--cream);
    padding: 28px 24px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .header h1 {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 300;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .header h1 em {
    font-style: italic;
    color: #C4A882;
  }

  .header-sub {
    font-size: 11px;
    color: #8A7F74;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .tab-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--cream);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab-btn.active, .tab-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  /* DAY STRIP */
  .day-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }

  .day-strip::-webkit-scrollbar { display: none; }

  .day-chip {
    flex-shrink: 0;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 8px 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    min-width: 58px;
  }

  .day-chip.active {
    background: var(--accent);
    border-color: var(--accent);
  }

  .day-chip.today {
    border-color: #C4A882;
  }

  .day-chip-name {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #8A7F74;
    display: block;
  }

  .day-chip.active .day-chip-name { color: rgba(255,255,255,0.8); }

  .day-chip-num {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    color: var(--cream);
    display: block;
    line-height: 1.1;
  }

  .day-chip-tag {
    font-size: 9px;
    color: #C4A882;
    display: block;
    margin-top: 2px;
  }

  /* MAIN CONTENT */
  .content {
    padding: 20px 16px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* DAY VIEW */
  .day-view { display: none; }
  .day-view.active { display: block; }

  .day-hero {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .day-title {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 300;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .day-training {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green-light);
    color: var(--green);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.3px;
    margin-top: 8px;
  }

  .day-training.rest {
    background: var(--warm-white);
    color: var(--muted);
  }

  /* MACRO SUMMARY BAR */
  .macro-bar {
    background: var(--ink);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    gap: 0;
  }

  .macro-item {
    flex: 1;
    text-align: center;
  }

  .macro-item:not(:last-child) {
    border-right: 1px solid rgba(255,255,255,0.08);
  }

  .macro-val {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--cream);
    display: block;
  }

  .macro-val.kcal { color: #C4A882; }
  .macro-val.protein { color: #7BC4A0; }
  .macro-val.fiber { color: #A0B4C4; }

  .macro-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #5A5550;
    display: block;
    margin-top: 2px;
  }

  /* MEAL CARDS */
  .meal-section {
    margin-bottom: 12px;
  }

  .meal-card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: transform 0.15s;
  }

  .meal-card:active { transform: scale(0.99); }

  .meal-header {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .meal-icon {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .meal-icon.frokost { background: var(--gold-light); }
  .meal-icon.lunsj { background: var(--green-light); }
  .meal-icon.snack { background: var(--accent-light); }
  .meal-icon.middag { background: #E8E0F5; }
  .meal-icon.ekstra { background: #F5E8E0; }
  .meal-icon.kvelds { background: #E0E8F5; }

  .meal-meta {
    flex: 1;
    min-width: 0;
  }

  .meal-type {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
  }

  .meal-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    display: block;
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .meal-macros {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .meal-kcal {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 300;
    color: var(--ink);
  }

  .meal-expand {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.2s;
    margin-left: 4px;
  }

  .meal-card.open .meal-expand { transform: rotate(180deg); }

  .meal-detail {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
  }

  .meal-card.open .meal-detail { display: block; }

  .meal-detail-top {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--warm-white);
    margin-bottom: 12px;
  }

  .detail-macro {
    flex: 1;
    text-align: center;
    background: var(--warm-white);
    border-radius: 10px;
    padding: 8px 4px;
  }

  .detail-macro-val {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 300;
    display: block;
  }

  .detail-macro-label {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-top: 2px;
  }

  .ingredients-title {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .ingredient-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--warm-white);
    font-size: 13px;
  }

  .ingredient-row:last-child { border-bottom: none; }

  .ingredient-name { color: var(--ink); }
  .ingredient-amount { color: var(--muted); font-size: 12px; }

  .meal-note {
    background: var(--gold-light);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    color: #7A5A1A;
    margin-top: 12px;
    line-height: 1.5;
  }

  .meal-note::before {
    content: "💡 ";
  }

  /* IRON REMINDER */
  .iron-reminder {
    background: var(--accent-light);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--accent);
    display: flex;
    gap: 8px;
    align-items: flex-start;
    line-height: 1.5;
  }

  /* SHOPPING LIST VIEW */
  .shop-view { display: none; }
  .shop-view.active { display: block; }

  .shop-section {
    margin-bottom: 24px;
  }

  .shop-section-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .shop-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--warm-white);
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .shop-item.checked {
    opacity: 0.4;
  }

  .shop-check {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 12px;
  }

  .shop-item.checked .shop-check {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }

  .shop-name {
    flex: 1;
    font-size: 14px;
    color: var(--ink);
  }

  .shop-amount {
    font-size: 12px;
    color: var(--muted);
    text-align: right;
  }

  .shop-reset {
    width: 100%;
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    margin-top: 16px;
    transition: all 0.2s;
  }

  .shop-reset:hover {
    background: var(--border);
    color: var(--ink);
  }

  /* DAILY NOTE */
  .daily-note {
    background: var(--ink);
    color: var(--cream);
    border-radius: 16px;
    padding: 16px 18px;
    margin-bottom: 20px;
    font-size: 13px;
    line-height: 1.6;
  }

  .daily-note-title {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #8A7F74;
    margin-bottom: 6px;
  }

  /* TRAN REMINDER */
  .tran-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #D4E8DA;
    color: var(--green);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    margin-bottom: 20px;
  }

  .bottom-space { height: 40px; }

  /* WEEK BUTTONS */
  .week-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--cream);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .week-btn.active {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.4);
    font-weight: 500;
  }

  /* RECIPE VIEW */
  .recipe-card {
    background: white;
    border-radius: 16px;
    border: 1px solid var(--border);
    margin-bottom: 16px;
    overflow: hidden;
  }

  .recipe-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px;
    cursor: pointer;
    user-select: none;
  }

  .recipe-emoji {
    font-size: 32px;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
    flex-shrink: 0;
  }

  .recipe-emoji.sotpotet { background: var(--gold-light); }
  .recipe-emoji.taco { background: var(--accent-light); }
  .recipe-emoji.gryte { background: #EAD5F0; }
  .shop-week-btn {
    flex: 1;
    padding: 10px 8px;
    border-radius: 12px;
    border: 2px solid #C4622D;
    background: white;
    color: #C4622D;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .shop-week-btn.active {
    background: #C4622D;
    color: white;
  }
  .shop-week-btn:hover:not(.active) {
    background: #FFF0E8;
  }
  .recipe-emoji.koreansk { background: #FFE8E8; }
  .recipe-emoji.chorizo { background: #FFE4CC; }

  .recipe-meta { flex: 1; }

  .recipe-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 300;
    color: var(--ink);
    display: block;
  }

  .recipe-sub {
    font-size: 11px;
    color: var(--muted);
    display: block;
    margin-top: 3px;
  }

  .recipe-expand {
    color: var(--muted);
    font-size: 14px;
    transition: transform 0.2s;
  }

  .recipe-card.open .recipe-expand { transform: rotate(180deg); }

  .recipe-body {
    display: none;
    padding: 0 16px 20px;
    border-top: 1px solid var(--border);
  }

  .recipe-card.open .recipe-body { display: block; }

  .recipe-macros {
    display: flex;
    gap: 0;
    background: var(--ink);
    border-radius: 12px;
    padding: 12px 16px;
    margin: 14px 0;
  }

  .recipe-macro-item {
    flex: 1;
    text-align: center;
  }

  .recipe-macro-item:not(:last-child) {
    border-right: 1px solid rgba(255,255,255,0.08);
  }

  .recipe-macro-val {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 300;
    display: block;
  }

  .recipe-macro-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #5A5550;
    display: block;
    margin-top: 2px;
  }

  .recipe-section-title {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 14px 0 8px;
  }

  .recipe-ingredient {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid var(--warm-white);
    font-size: 13px;
  }

  .recipe-ingredient:last-child { border-bottom: none; }
  .recipe-ingredient-name { color: var(--ink); }
  .recipe-ingredient-amount { color: var(--muted); }

  .recipe-step {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--warm-white);
    font-size: 13px;
    line-height: 1.5;
    color: var(--ink);
  }

  .recipe-step:last-child { border-bottom: none; }

  .recipe-step-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .recipe-tip {
    background: var(--gold-light);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    color: #7A5A1A;
    margin-top: 14px;
    line-height: 1.5;
  }

  .recipe-tip::before { content: "💡 "; }

  .recipe-storage {
    background: var(--green-light);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--green);
    margin-top: 10px;
    line-height: 1.5;
  }

  .recipe-storage::before { content: "📦 "; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>Pias <em>matplan</em></h1>
      <div class="header-sub">7-dagers optimalisert plan</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="tab-btn active" onclick="showTab('days')">Dager</button>
      <button class="tab-btn" onclick="showTab('shop')">Handle</button>
      <button class="tab-btn" onclick="showTab('recipes')">Oppskrifter</button>
    </div>
  </div>

  <!-- WEEK SELECTOR -->
  <div id="weekSelector" style="margin-bottom:12px;">
    <div style="display:flex;gap:8px;">
      <button class="week-btn active" id="weekBtn1" onclick="selectWeek(1)">Uke 1</button>
      <button class="week-btn" id="weekBtn2" onclick="selectWeek(2)">Uke 2</button>
      <button class="week-btn" id="weekBtn3" onclick="selectWeek(3)">Uke 3</button>
    </div>
    <div style="font-size:10px;color:#8A7F74;letter-spacing:0.5px;margin-top:6px;" id="weekLabel">Torsdag – Søndag · Taco bowl</div>
  </div>

  <div class="day-strip" id="dayStrip"></div>
</div>

<div class="content">

  <!-- DAY VIEWS -->
  <div id="daysContainer"></div>

  <!-- SHOPPING LIST -->
  <div class="shop-view" id="shopView">
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button class="shop-week-btn active" id="shopBtn1" onclick="showShopList(1)">Uke 1–2</button>
      <button class="shop-week-btn" id="shopBtn2" onclick="showShopList(2)">Uke 2 helg</button>
      <button class="shop-week-btn" id="shopBtn3" onclick="showShopList(3)">Uke 3 🆕</button>
    </div>
    <div id="shopContent"></div>
    <div id="shopContent2" style="display:none"></div>
    <div id="shopContent3" style="display:none"></div>
  </div>

  <!-- RECIPES -->
  <div class="shop-view" id="recipesView">
    <div id="recipesContent"></div>
  </div>

</div>

<script>
const days = [
  {
    name: "Mandag",
    short: "Man",
    num: 1,
    week: 2,
    training: "HIIT",
    trainIcon: "🔥",
    kcal: 2149, protein: 178, fiber: 46.0,
    ironDay: true,
    note: "Hard HIIT-dag — spis nok! Kasein til kvelds støtter muskelreparasjon hele natten.",
    meals: [
      {
        type: "Frokost", icon: "🥣", iconClass: "frokost",
        name: "Yoghurt bowl + tran",
        kcal: 411, protein: 46, fiber: 8,
        ingredients: [
          { name: "Gresk yoghurt 2%", amount: "250g" },
          { name: "Cottage cheese", amount: "130g" },
          { name: "Nøttetopping (pekannøtter, makadamia, mandler, solsikkekjerner)", amount: "15g" },
          { name: "Frosne bær", amount: "100g" },
          { name: "Kakaonibs", amount: "5g" },
          { name: "Tran-kapsel", amount: "1 stk" }
        ],
        note: "Rør cottage cheese inn i yoghurten — gir ekstra protein uten søt smak. Syrlig og godt! Ta tran-kapselen til maten."
      },
      {
        type: "Lunsj", icon: "🐟", iconClass: "lunsj",
        name: "Jobblunsj m/makrell",
        kcal: 600, protein: 34, fiber: 9,
        ingredients: [
          { name: "Knekkebrød Husmann", amount: "2 stk" },
          { name: "Makrell i tomat (blå kant)", amount: "125g" },
          { name: "Grovbrødskive", amount: "2 stk" },
          { name: "Leverpostei", amount: "50g" },
          { name: "Sylteagurk + grønnsaker", amount: "etter smak" }
        ],
        note: "Unngå kaffe/te de første 60 min etter lunsj — øker jernopptaket fra makrell og leverpostei."
      },
      {
        type: "Snack", icon: "🍎", iconClass: "snack",
        name: "Cottage cheese + eple",
        kcal: 276, protein: 30, fiber: 4,
        ingredients: [
          { name: "Cottage cheese", amount: "250g" },
          { name: "Eple", amount: "1 stk" }
        ],
        note: "Perfekt ettermiddagssnack — holder deg stabil frem til middag."
      },
      {
        type: "Middag", icon: "🍠", iconClass: "middag",
        name: "Hot honey søtpotet bowl",
        kcal: 555, protein: 27, fiber: 20,
        ingredients: [
          { name: "Søtpotet (bakt)", amount: "240g ferdig stekt (≈300g rå)" },
          { name: "Cottage cheese", amount: "100g" },
          { name: "Kikerter (sprøstekt)", amount: "100g" },
          { name: "Rucola/babyspinat", amount: "50g" },
          { name: "Avokado", amount: "¼ stk" },
          { name: "Hot honey (honning + chiliflak)", amount: "1 ss" },

function renderWeek(week) {
  currentWeek = week;
  const cfg = weekConfig[week];

  // Update week buttons
  document.querySelectorAll('.week-btn').forEach((b, i) => {
    b.classList.toggle('active', i + 1 === week);
  });  document.getElementById('weekLabel').textContent = cfg.label;

  // Rebuild day strip
  const strip = document.getElementById('dayStrip');
  strip.innerHTML = '';
  cfg.days.forEach((di, pos) => {
    const d = days[di];
    const chip = document.createElement('div');
    chip.className = 'day-chip';
    chip.id = `chip-${di}`;
    chip.innerHTML = `
      <span class="day-chip-name">${d.short.replace(/[0-9]/g, '')}</span>
      <span class="day-chip-num">${d.num}</span>
      <span class="day-chip-tag">${d.trainIcon}</span>
    `;
    chip.onclick = () => selectDay(di);
    strip.appendChild(chip);
  });

  // Show first day of week
  selectDay(cfg.days[0]);
}

function selectDay(di) {
  currentDayIndex = di;
  // Update chips
  document.querySelectorAll('.day-chip').forEach(c => c.classList.remove('active'));
  const chip = document.getElementById(`chip-${di}`);
  if (chip) chip.classList.add('active');
  // Update views
  document.querySelectorAll('.day-view').forEach(v => v.classList.remove('active'));
  document.getElementById(`day-${di}`).classList.add('active');
}

function selectWeek(week) {
  renderWeek(week);
}

let checkedItems3 = JSON.parse(localStorage.getItem('pia-shopping-checked-3') || '{}');

function buildShopList3() {
  const container = document.getElementById('shopContent3');
  container.innerHTML = '';
  shopping3.forEach((section, si) => {
    const sec = document.createElement('div');
    sec.className = 'shop-section';
    const itemsHTML = section.items.map((item, ii) => {
      const key = `${si}-${ii}`;
      const checked = checkedItems3[key] ? 'checked' : '';
      return `
        <div class="shop-item ${checked}" onclick="toggleShop3('${key}')">
          <div class="shop-check">${checked ? '✓' : ''}</div>
          <span class="shop-name">${item.name}</span>
          <span class="shop-amount">${item.amount}</span>
        </div>
      `;
    }).join('');
    sec.innerHTML = `<div class="shop-section-title">${section.category}</div>${itemsHTML}`;
    container.appendChild(sec);
  });
  const resetBtn = document.createElement('button');
  resetBtn.className = 'shop-reset';
  resetBtn.textContent = '↺ Nullstill handleliste';
  resetBtn.onclick = () => {
    checkedItems3 = {};
    localStorage.setItem('pia-shopping-checked-3', '{}');
    buildShopList3();
  };
  container.appendChild(resetBtn);
  container.appendChild(Object.assign(document.createElement('div'), {className: 'bottom-space'}));
}

buildShopList3();

function toggleShop3(key) {
  checkedItems3[key] = !checkedItems3[key];
  localStorage.setItem('pia-shopping-checked-3', JSON.stringify(checkedItems3));
  buildShopList3();
}
function toggleMeal(di, mi) {
  const card = document.getElementById(`meal-${di}-${mi}`);
  card.classList.toggle('open');
}

function toggleShop(key) {
  checkedItems[key] = !checkedItems[key];
  localStorage.setItem('pia-shopping-checked', JSON.stringify(checkedItems));
  buildShopList();
}

function buildRecipes() {
  const container = document.getElementById('recipesContent');
  container.innerHTML = '';

  recipes.forEach((r, ri) => {
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.id = `recipe-${ri}`;

    const ingHTML = r.ingredients.map(i => `
      <div class="recipe-ingredient">
        <span class="recipe-ingredient-name">${i.name}</span>
        <span class="recipe-ingredient-amount">${i.amount}</span>
      </div>
    `).join('');

    const stepsHTML = r.steps.map((s, si) => `
      <div class="recipe-step">
        <div class="recipe-step-num">${si + 1}</div>
        <div>${s}</div>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="recipe-header" onclick="toggleRecipe(${ri})">
        <div class="recipe-emoji ${r.emojiClass}">${r.emoji}</div>
        <div class="recipe-meta">
          <span class="recipe-title">${r.title}</span>
          <span class="recipe-sub">${r.sub}</span>
        </div>
        <span class="recipe-expand">▾</span>
      </div>
      <div class="recipe-body">
        <div class="recipe-macros">
          <div class="recipe-macro-item">
            <span class="recipe-macro-val" style="color:#C4A882">${r.kcal}</span>
            <span class="recipe-macro-label">kcal</span>
          </div>
          <div class="recipe-macro-item">
            <span class="recipe-macro-val" style="color:#7BC4A0">${r.protein}g</span>
            <span class="recipe-macro-label">protein</span>
          </div>
          <div class="recipe-macro-item">
            <span class="recipe-macro-val" style="color:#A0B4C4">${r.fiber}g</span>
            <span class="recipe-macro-label">fiber</span>
          </div>
        </div>
        <div class="recipe-section-title">Ingredienser — ${r.sub.split('·')[1].trim()}</div>
        ${ingHTML}
        <div class="recipe-section-title" style="margin-top:18px">Fremgangsmåte</div>
        ${stepsHTML}
        <div class="recipe-tip">${r.tip}</div>
        <div class="recipe-storage">${r.storage}</div>
        <div class="bottom-space"></div>
      </div>
    `;
    container.appendChild(card);
  });
}

buildRecipes();

function toggleRecipe(ri) {
  const card = document.getElementById(`recipe-${ri}`);
  card.classList.toggle('open');
}

function showTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  const daysContainer = document.getElementById('daysContainer');
  const shopView = document.getElementById('shopView');
  const recipesView = document.getElementById('recipesView');
  const strip = document.getElementById('dayStrip');
  const weekSel = document.getElementById('weekSelector');

  daysContainer.style.display = 'none';
  shopView.classList.remove('active');
  recipesView.classList.remove('active');
  strip.style.display = 'none';
  weekSel.style.display = 'none';

  if (tab === 'days') {
    daysContainer.style.display = 'block';
    strip.style.display = 'flex';
    weekSel.style.display = 'block';
  } else if (tab === 'shop') {
    shopView.classList.add('active');
  } else if (tab === 'recipes') {
    recipesView.classList.add('active');
  }
}
